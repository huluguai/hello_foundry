[profile.default]
src = "src"
out = "out"
libs = ["lib"]

solc = "0.8.24"

# 从项目根目录 .env 读取 RPC_URL、ETHERSCAN_API_KEY（Foundry 自动加载 .env 做 ${VAR} 替换）
[rpc_endpoints]
sepolia = "${RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
